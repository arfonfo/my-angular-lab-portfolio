<section id="contacto" class="py-20 px-6 bg-dark-card/30">
  <div class="max-w-4xl mx-auto">
    <div class="text-center mb-12">
      <h2 class="text-4xl font-bold text-dark-text mb-4">Contacto</h2>
      <p class="text-xl text-dark-muted">
        ¿Tienes un proyecto en mente? Hablemos
      </p>
    </div>

    <div class="grid md:grid-cols-2 gap-6">
      <a href="mailto:alfonsojose.sanchez@gmail.com"
         class="bg-dark-card border border-dark-border rounded-lg p-6 hover:border-accent-primary transition-colors group">
        <div class="flex items-start space-x-4">
          <div class="flex items-center justify-center w-12 h-12 bg-dark-bg rounded-lg group-hover:bg-accent-primary/10 transition-colors">
            <lucide-icon name="mail" [size]="24" class="text-accent-primary"></lucide-icon>
          </div>
          <div>
            <h3 class="text-lg font-semibold text-dark-text mb-1">Email</h3>
            <p class="text-dark-muted text-sm">alfonsojose.sanchez@gmail.com</p>
          </div>
        </div>
      </a>

      <a href="tel:660185041"
         class="bg-dark-card border border-dark-border rounded-lg p-6 hover:border-accent-primary transition-colors group">
        <div class="flex items-start space-x-4">
          <div class="flex items-center justify-center w-12 h-12 bg-dark-bg rounded-lg group-hover:bg-accent-primary/10 transition-colors">
            <lucide-icon name="phone" [size]="24" class="text-accent-primary"></lucide-icon>
          </div>
          <div>
            <h3 class="text-lg font-semibold text-dark-text mb-1">Teléfono</h3>
            <p class="text-dark-muted text-sm">660 185 041</p>
          </div>
        </div>
      </a>

      <a href="https://github.com/arfonfo"
         target="_blank"
         rel="noopener noreferrer"
         class="bg-dark-card border border-dark-border rounded-lg p-6 hover:border-accent-primary transition-colors group">
        <div class="flex items-start space-x-4">
          <div class="flex items-center justify-center w-12 h-12 bg-dark-bg rounded-lg group-hover:bg-accent-primary/10 transition-colors">
            <lucide-icon name="github" [size]="24" class="text-accent-primary"></lucide-icon>
          </div>
          <div>
            <h3 class="text-lg font-semibold text-dark-text mb-1">GitHub</h3>
            <p class="text-dark-muted text-sm">arfonfo</p>
          </div>
        </div>
      </a>

      <a href="https://www.linkedin.com/in/alfonsojsanchez/"
         target="_blank"
         rel="noopener noreferrer"
         class="bg-dark-card border border-dark-border rounded-lg p-6 hover:border-accent-primary transition-colors group">
        <div class="flex items-start space-x-4">
          <div class="flex items-center justify-center w-12 h-12 bg-dark-bg rounded-lg group-hover:bg-accent-primary/10 transition-colors">
            <lucide-icon name="linkedin" [size]="24" class="text-accent-primary"></lucide-icon>
          </div>
          <div>
            <h3 class="text-lg font-semibold text-dark-text mb-1">LinkedIn</h3>
            <p class="text-dark-muted text-sm">Alfonso Sánchez</p>
          </div>
        </div>
      </a>
    </div>

    <div class="mt-8 text-center">
      <div class="inline-flex items-center space-x-2 text-dark-muted">
        <lucide-icon name="map-pin" [size]="18" class="text-accent-primary"></lucide-icon>
        <span>Murcia, España</span>
      </div>
    </div>
  </div>
</section>
