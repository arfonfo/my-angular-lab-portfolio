<section id="proyectos" class="py-20 px-6">
  <div class="max-w-6xl mx-auto">
    <div class="flex items-center mb-12">
      <lucide-icon name="folder-git-2" [size]="32" class="mr-3 text-accent-primary"></lucide-icon>
      <h2 class="text-4xl font-bold text-dark-text">Proyectos</h2>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (project of projects; track project.title) {
        <div class="bg-dark-card border border-dark-border rounded-lg p-6 hover:border-accent-primary transition-all duration-300 group">
          <h3 class="text-xl font-bold text-dark-text mb-3 group-hover:text-accent-primary transition-colors">
            {{ project.title }}
          </h3>

          <p class="text-dark-muted mb-4 text-sm leading-relaxed">
            {{ project.description }}
          </p>

          <div class="flex flex-wrap gap-2 mb-4">
            @for (tech of project.tech; track tech) {
              <span class="bg-dark-bg border border-dark-border text-accent-primary px-3 py-1 rounded text-xs">
                {{ tech }}
              </span>
            }
          </div>

          <div class="flex space-x-4">
            @if (project.github) {
              <a [href]="project.github"
                 target="_blank"
                 rel="noopener noreferrer"
                 class="inline-flex items-center text-dark-muted hover:text-accent-primary transition-colors text-sm">
                <lucide-icon name="github" [size]="16" class="mr-1"></lucide-icon>
                Código
              </a>
            }
            <a [href]="project.link"
               class="inline-flex items-center text-dark-muted hover:text-accent-primary transition-colors text-sm">
              <lucide-icon name="external-link" [size]="16" class="mr-1"></lucide-icon>
              Demo
            </a>
          </div>
        </div>
      }
    </div>
  </div>
</section>
